<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Recuperar Senha</title>
    <link rel="stylesheet" type="text/css" href="./estilo.css" />

</head>
<body>

            <tr>
                <td colspan="2">
                    <button id="btnEnviarLink">Enviar Link</button>
                    <a href="index.html">Voltar</a>

            </tr>
        </table>
    </div>

    <script src="src/web/js/forgot-password.js"></script>
</body>
</html>
