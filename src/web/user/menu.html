<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Menu Principal - Sistema Seguro</title>
    <link rel="stylesheet" type="text/css" href="./estilo.css" />
</head>
<body>

    <div class="menu-container">
        <h1>Seja bem-vindo ao Sistema</h1>
        <h2>Painel de Controle</h2>

        <nav>
            <ul style="list-style: none; padding: 0;">
                <li style="margin-bottom: 10px;">
                    <a href="/src/web/user/new.html" class="btn-menu">📂 Gestão de Usuários</a>
                </li>
                <li style="margin-bottom: 10px;">
                    <a href="/index.html" id="btnLogout" class="btn-logout">⬅️ Sair do Sistema</a>
                </li>
            </ul>
        </nav>
    </div>

    <script>
        // Pequena lógica de segurança para o Menu
        document.addEventListener("DOMContentLoaded", function() {
            const token = localStorage.getItem('@Projeto:token');
            
            // Se não tiver token, expulsa o usuário de volta para o login
            if (!token) {
                alert("Acesso negado! Por favor, faça login.");
                window.location.href = "/index.html";
            }
        });

        // Lógica para limpar o token ao clicar em Sair
        document.getElementById('btnLogout').addEventListener('click', function() {
            localStorage.removeItem('@Projeto:token');
        });
    </script>
</body>
</html>
